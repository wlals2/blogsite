name: Deploy WAS to Kubernetes

# ==============================================================================
# 트리거 정책
# ==============================================================================
# - push: WAS 소스 변경 시 즉시 CI 실행
# - schedule: 매일 새벽 02:00 Trivy CVE 전체 스캔 (빌드 시간 영향 없음)
# - workflow_dispatch: 수동 실행 (긴급 배포 또는 재스캔)
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'blog-k8s-project/was/**'
      - '.github/workflows/deploy-was.yml'
  # Why: Trivy를 야간 별도 Job으로 분리 → Push 빌드 시간에 영향 없음
  schedule:
    - cron: '0 17 * * *'  # 매일 새벽 02:00 KST (UTC 17:00 = KST 02:00)

# Why: 연속 push 시 BuildKit 로컬 캐시 lock 충돌 방지 (buildkit-was 폴더 동시 접근)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ghcr.io/wlals2/board-was
  NAMESPACE: blog-system
  DEPLOYMENT_NAME: was

# ==============================================================================
# Job 구조
# ==============================================================================
#
# git push → main
#   secrets-scan (~30초) → build-push (~1분 30초) → deploy (~1분)
#   [직렬]
#   Why: runner 2개(k8s-cp, k8s-cp-2)지만 secrets-scan 먼저 통과해야
#        오염된 이미지가 GHCR에 올라가지 않음 (보안 게이트)
#        build-push와 deploy는 서로 다른 runner에서 겹치지 않게 실행
#
# schedule (매일 02:00):
#   └─ trivy-nightly  OS 패키지 + Java 라이브러리 CVE 스캔 → Discord 알림
#
# 총 Push CI 시간: 30초 + 1분 30초 + 1분 ≈ 3분
jobs:

  # ============================================================================
  # Job 1: Secrets 스캔 (보안 게이트 - 첫 번째 실행)
  # ============================================================================
  # Why: Secrets 발견 시 build-push 자체를 막음 → 오염된 이미지 GHCR 업로드 방지
  #      GitLeaks만 "이전 커밋에서 지운 Secrets"까지 탐지 가능
  #      탐지 예시: DISCORD_TOKEN, DB_PASSWORD 하드코딩 후 삭제해도 히스토리에 남음
  secrets-scan:
    if: github.event_name != 'schedule'
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Why: 전체 Git 히스토리 스캔 (depth=1이면 과거 커밋 놓침)
          fetch-depth: 0

      - name: Scan for secrets with GitLeaks
        # Why: gitleaks-action@v2는 self-hosted runner에서 rootDirectory 불일치 에러 발생
        #      직접 실행 방식으로 교체 (WEB CI와 동일한 방식)
        run: |
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_BIN="/tmp/gitleaks-${GITLEAKS_VERSION}/gitleaks"
          if [ ! -f "$GITLEAKS_BIN" ]; then
            mkdir -p "/tmp/gitleaks-${GITLEAKS_VERSION}"
            curl -sSfL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C "/tmp/gitleaks-${GITLEAKS_VERSION}"
          fi
          $GITLEAKS_BIN detect --source=. -v --exit-code=2 --log-opts="HEAD~1..HEAD"

  # ============================================================================
  # Job 2: Docker 빌드 & 푸시 (secrets-scan 성공 후 실행)
  # ============================================================================
  # Why: secrets-scan 통과 후에만 빌드 → 오염된 이미지 GHCR 업로드 방지
  build-push:
    if: github.event_name != 'schedule'
    needs: [secrets-scan]
    runs-on: self-hosted
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=v${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./blog-k8s-project/was
          file: ./blog-k8s-project/was/Dockerfile
          push: true
          load: true
          # Why: runner 재연결 후 docker login 컨텍스트 초기화 시 docker pull이 unauthorized 실패
          #      로컬 daemon에 저장해두면 Verify Build step에서 pull 불필요
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          # Why: /mnt/data/ci/cache/buildkit-was → 재부팅 후에도 유지 (영구 디스크)
          #      /tmp는 재부팅 시 삭제됨 → 매번 full rebuild
          #      type=gha는 10GB 한도 초과로 evict → 로컬 영구 디스크 사용
          cache-from: type=local,src=/mnt/data/ci/cache/buildkit-was
          cache-to: type=local,dest=/mnt/data/ci/cache/buildkit-was,mode=max

      - name: Verify Build
        run: |
          # Why: load: true로 이미지가 이미 로컬 daemon에 있으므로 pull 불필요
          #      docker pull은 runner 재연결 후 auth context 초기화 시 unauthorized 실패
          docker image inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} > /dev/null
          IMAGE_SIZE=$(docker image inspect ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            --format='{{.Size}}' | awk '{print int($1/1024/1024)}')
          echo "Image size: ${IMAGE_SIZE} MB"
          if [ $IMAGE_SIZE -lt 50 ]; then
            echo "Image too small: ${IMAGE_SIZE} MB"
            exit 1
          fi

  # ============================================================================
  # Job 3: GitOps 배포 (build-push 성공 후 실행)
  # ============================================================================
  deploy:
    if: github.event_name != 'schedule'
    runs-on: self-hosted
    needs: [build-push]
    steps:
      - name: Update Kubernetes Manifest (GitOps)
        env:
          GITHUB_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          TEMP_DIR="/tmp/k8s-manifests-${{ github.run_number }}"
          git clone --depth 1 https://${{ secrets.GITOPS_TOKEN }}@github.com/wlals2/k8s-manifests.git $TEMP_DIR
          cd $TEMP_DIR/services/blog-system/was

          yq eval ".spec.template.spec.containers[0].image = \"${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image-tag }}\"" \
            -i was-rollout.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add was-rollout.yaml
          git commit -m "chore: Update WAS image to ${{ needs.build-push.outputs.image-tag }} (Canary)"
          git push origin main

          rm -rf $TEMP_DIR
          echo "Manifest updated: ${{ needs.build-push.outputs.image-tag }}"
          echo "ArgoCD will deploy automatically (within 3min)"

      - name: Wait for ArgoCD Sync
        run: |
          echo "Waiting for ArgoCD to sync..."
          sleep 30
          kubectl get application blog-system -n argocd
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=was

      - name: Build Summary
        if: success()
        run: |
          echo "### ✅ WAS Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Gates**: Secrets ✅ | Build ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace**: ${{ env.NAMESPACE }}" >> $GITHUB_STEP_SUMMARY

      - name: Send Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "WAS 배포 ${{ job.status == 'success' && '성공' || '실패' }}"
          description: |
            **이미지**: ${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image-tag }}
            **커밋**: ${{ github.event.head_commit.message }}
            **작성자**: ${{ github.event.head_commit.author.name }}
            **보안 게이트**: Secrets ✅ | Build ✅
            **URL**: https://blog.jiminhome.shop/
            **워크플로우**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ job.status == 'success' && 0x00FF00 || 0xFF0000 }}
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

  # ============================================================================
  # Job 5: 야간 Trivy CVE 스캔 (schedule 전용)
  # ============================================================================
  # Why: OS 패키지(alpine libssl 등) + Java 라이브러리 CVE 통합 스캔
  #      매일 새벽 최신 CVE DB로 스캔 → 오늘 발표된 CVE도 내일 새벽 탐지
  #      Push 시 실행하지 않아 빌드 시간 영향 없음
  trivy-nightly:
    # Why: workflow_dispatch 허용 → 수동으로 Trivy 스캔 테스트 가능
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    steps:
      # Why: trivy-action 대신 직접 실행 (setup-trivy가 aquasecurity/trivy main 브랜치 clone 실패 문제)
      - name: Scan latest image with Trivy
        id: trivy
        run: |
          TRIVY_VERSION="0.69.2"
          # Why: /mnt/data/ci/cache/ → 재부팅 후에도 유지되는 영구 디스크
          #      /tmp는 재부팅 시 삭제 → Trivy 바이너리 매번 재다운로드
          TRIVY_BIN="/mnt/data/ci/cache/trivy-db/trivy-${TRIVY_VERSION}"

          if [ ! -f "$TRIVY_BIN" ]; then
            curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
              | tar -xz -C "/mnt/data/ci/cache/trivy-db" trivy
            mv /mnt/data/ci/cache/trivy-db/trivy "$TRIVY_BIN"
          fi

          # Why: 이전 버전 바이너리 삭제 (trivy-0.68.x 등 구버전 누적 방지)
          #      현재 버전(TRIVY_BIN)은 유지, 나머지 trivy-* 파일만 제거
          # Why: -mindepth 1 → 디렉터리 자체(trivy-db)가 trivy-* 패턴에 매칭되어 삭제 시도되는 것을 방지
          find /mnt/data/ci/cache/trivy-db -mindepth 1 -maxdepth 1 -name 'trivy-*' ! -name "trivy-${TRIVY_VERSION}" -delete

          # Why: fanal/ = 이미지 레이어 분석 캐시 → 이미지 교체 시 이전 레이어는 유령 데이터
          #      야간 스캔 전에 매일 초기화 → trivy.db(CVE DB)는 유지, fanal만 제거
          rm -rf /mnt/data/ci/cache/trivy-db/fanal/

          # Why: --cache-dir /mnt/data/ci/cache/trivy-db → Trivy가 자체적으로 DB 갱신
          #      NextUpdate 지났으면 trivy.db 전체 교체 (993MB), 아니면 기존 재사용
          #      GHA Cache 사용 시: 매일 새 key → 누적 → 10GB 초과 / 로컬은 항상 덮어쓰기
          # Why: JSON → jq로 취약점 수 파싱, table → 로그에서 사람이 읽기 위한 출력
          $TRIVY_BIN image \
            --cache-dir /mnt/data/ci/cache/trivy-db \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format json \
            --output /tmp/trivy-result.json \
            --timeout 10m \
            ${{ env.IMAGE_NAME }}:latest

          $TRIVY_BIN image \
            --cache-dir /mnt/data/ci/cache/trivy-db \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format table \
            --timeout 10m \
            ${{ env.IMAGE_NAME }}:latest

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' /tmp/trivy-result.json)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' /tmp/trivy-result.json)
          TOTAL=$((CRITICAL + HIGH))

          # Why: Discord에서 Actions 로그를 열지 않고도 어떤 CVE인지 바로 확인하기 위해
          VULN_SUMMARY=$(jq -r '
            [.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
            | sort_by(if .Severity=="CRITICAL" then 0 else 1 end)
            | .[]
            | "• \(.Severity) | \(.PkgName) \(.InstalledVersion) → \(.FixedVersion) | \(.VulnerabilityID)"
          ' /tmp/trivy-result.json)

          echo "vuln_total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "vuln_critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "vuln_high=$HIGH" >> "$GITHUB_OUTPUT"
          # Why: multiline output → delimiter 방식 (EOF 구분자로 줄바꿈 보존)
          {
            echo "vuln_summary<<TRIVY_EOF"
            echo "$VULN_SUMMARY"
            echo "TRIVY_EOF"
          } >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Send Trivy Scan Result to Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          # Why: 스캔 실패(timeout 등)와 취약점 발견을 구분하기 위해 outcome이 아닌 취약점 수로 판단
          status: ${{ steps.trivy.outcome == 'failure' && 'failure' || 'success' }}
          title: "${{ steps.trivy.outcome == 'failure' && '❌ 야간 보안 스캔 실패 (WAS)' || steps.trivy.outputs.vuln_total != '0' && '⚠️ 야간 보안 스캔 완료 (WAS)' || '🔒 야간 보안 스캔 완료 (WAS)' }}"
          description: |
            **스캔 대상**: ${{ env.IMAGE_NAME }}:latest
            **스캔 범위**: CRITICAL, HIGH CVE (OS 패키지 + Java 라이브러리)
            **결과**: ${{ steps.trivy.outcome == 'failure' && '❌ 스캔 실행 실패 - 워크플로우 확인 필요' || steps.trivy.outputs.vuln_total == '0' && '✅ 취약점 없음' || format('⚠️ {0}개 취약점 발견 (Critical: {1}, High: {2})', steps.trivy.outputs.vuln_total, steps.trivy.outputs.vuln_critical, steps.trivy.outputs.vuln_high) }}
            ${{ steps.trivy.outputs.vuln_total != '0' && steps.trivy.outputs.vuln_summary || '' }}
            **워크플로우**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ steps.trivy.outcome == 'failure' && 0xFF0000 || steps.trivy.outputs.vuln_total != '0' && 0xFF6600 || 0x00FF00 }}
          username: Trivy Scanner
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

      # Why: 취약점 발견 시 GitHub Issue로 이력 관리 + 조치 추적
      #      Discord는 흘러가지만, Issue는 해결까지 열려 있으므로 추적 가능
      - name: Create GitHub Issue for vulnerabilities
        if: steps.trivy.outcome == 'success' && steps.trivy.outputs.vuln_total != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)

          # Why: 같은 날 중복 Issue 방지 (야간 스캔은 하루 1회지만, 수동 재실행 대비)
          EXISTING=$(gh issue list --search "Trivy 야간 스캔 ${TODAY}" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "이미 오늘자 Issue #${EXISTING} 존재 → 스킵"
            exit 0
          fi

          # Why: OS 패키지와 Java 라이브러리는 조치 방법이 다르므로 분리
          OS_VULNS=$(jq -r '
            [.Results[]? | select(.Type != "jar") | .Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
            | sort_by(if .Severity=="CRITICAL" then 0 else 1 end)
            | .[]
            | "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion) | \(.VulnerabilityID) |"
          ' /tmp/trivy-result.json)

          JAVA_VULNS=$(jq -r '
            [.Results[]? | select(.Type == "jar") | .Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
            | sort_by(if .Severity=="CRITICAL" then 0 else 1 end)
            | .[]
            | "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion) | \(.VulnerabilityID) |"
          ' /tmp/trivy-result.json)

          # Why: security label이 없으면 gh issue create --label 실패
          gh api repos/${{ github.repository }}/labels \
            -f name="security" -f color="e11d48" -f description="보안 취약점 관련" \
            2>/dev/null || true

          # Why: --body-file 사용 → heredoc 들여쓰기 문제 회피
          cat > /tmp/trivy-issue.md <<EOF
          ## 스캔 결과

          - **스캔 대상**: \`${{ env.IMAGE_NAME }}:latest\`
          - **발견일**: ${TODAY}
          - **총 취약점**: ${{ steps.trivy.outputs.vuln_total }}개 (Critical: ${{ steps.trivy.outputs.vuln_critical }}, High: ${{ steps.trivy.outputs.vuln_high }})
          - **워크플로우**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## OS 패키지 취약점

          | Severity | Package | Installed | Fixed | CVE |
          |----------|---------|-----------|-------|-----|
          ${OS_VULNS:-| - | 없음 | - | - | - |}

          **조치 방법**: Dockerfile의 베이스 이미지 업데이트
          \`\`\`dockerfile
          # 현재: FROM eclipse-temurin:21-jre-alpine
          # 조치: alpine 패키지 업데이트 추가
          RUN apk update && apk upgrade --no-cache
          \`\`\`

          ## Java 라이브러리 취약점

          | Severity | Package | Installed | Fixed | CVE |
          |----------|---------|-----------|-------|-----|
          ${JAVA_VULNS:-| - | 없음 | - | - | - |}

          **조치 방법**: \`build.gradle\` 또는 \`pom.xml\`에서 의존성 버전 업그레이드
          - Spring Boot 버전 업: 취약한 tomcat-embed, spring-security, spring-core가 함께 패치됨
          - 개별 라이브러리: Fixed Version 컬럼 참조

          ## 조치 체크리스트

          - [ ] OS 패키지 취약점 조치 (베이스 이미지 또는 apk upgrade)
          - [ ] Java 라이브러리 취약점 조치 (의존성 버전 업그레이드)
          - [ ] 변경 후 \`git push\` → CI 빌드 → Trivy 재스캔으로 해소 확인
          - [ ] 확인 완료 후 이 Issue 닫기
          EOF

          # Why: sed로 YAML 들여쓰기(10칸)를 제거 → Issue 본문이 깔끔하게 렌더링
          sed -i 's/^          //' /tmp/trivy-issue.md

          gh issue create \
            --title "🔒 Trivy 야간 스캔: ${{ steps.trivy.outputs.vuln_total }}개 취약점 발견 (${TODAY})" \
            --label "security" \
            --body-file /tmp/trivy-issue.md
