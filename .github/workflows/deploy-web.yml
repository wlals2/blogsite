name: Deploy WEB to Kubernetes

on:
  push:
    branches: [ main ]
    paths:
      - 'content/**'
      - 'static/**'
      - 'layouts/**'
      - 'themes/**'
      - 'config.toml'
      - 'data/**'
      - 'Dockerfile'
      - 'nginx.conf'
      - '.github/workflows/deploy-web.yml'
      # Why: WAS 소스/workflow 변경은 WEB 빌드 불필요
      #      update-metrics.yml의 data/metrics.yaml 커밋은 data/** 포함
  workflow_dispatch:  # 수동 실행 가능

env:
  IMAGE_NAME: ghcr.io/wlals2/blog-web
  NAMESPACE: blog-system
  DEPLOYMENT_NAME: web

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # ======================================================================
      # Step 1: Checkout 코드
      # ======================================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # PaperMod은 더 이상 submodule이 아님
          # Why: 직전 커밋 1개만 스캔 (증분) - 과거 히스토리는 최초 full scan 이후 clean 보장
          fetch-depth: 2

      # ======================================================================
      # Step 1.5: Secrets 스캔 (DevSecOps - GitLeaks)
      # ======================================================================
      # Why: Hugo config, Cloudflare API Token 등이 실수로 커밋될 수 있음
      #      탐지 예시: CLOUDFLARE_API_TOKEN, GHCR_TOKEN 하드코딩 후 삭제해도 히스토리에 남음
      #      exit-code 2 → Secrets 발견 시 이후 Steps 전체 차단 (Build/Deploy 불가)
      # Why: gitleaks-action@v2 대신 직접 실행
      #      self-hosted runner에서 SARIF 업로드 시 rootDirectory 불일치 에러 발생
      #      action 내부에서 SARIF 업로드를 항상 실행해 ENABLE_SUMMARY 옵션으로 막을 수 없음
      - name: Scan for secrets with GitLeaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_BIN="/tmp/gitleaks-${GITLEAKS_VERSION}/gitleaks"

          # 바이너리 없으면 다운로드 (캐시 히트 시 재사용)
          if [ ! -f "$GITLEAKS_BIN" ]; then
            mkdir -p "/tmp/gitleaks-${GITLEAKS_VERSION}"
            curl -sSfL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C "/tmp/gitleaks-${GITLEAKS_VERSION}"
          fi

          # exit-code=2: secrets 발견 시 step 실패 → 이후 빌드/배포 차단
          # Why: HEAD~1..HEAD = 직전 커밋만 스캔 (증분) - 전체 히스토리 스캔 대비 ~90% 시간 절약
          $GITLEAKS_BIN detect --source=. -v --exit-code=2 --log-opts="HEAD~1..HEAD"

      # ======================================================================
      # Step 2: Docker Buildx 설정 (캐시 활용)
      # ======================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ======================================================================
      # Step 3: GHCR 로그인
      # ======================================================================
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ======================================================================
      # Step 4: Docker 이미지 빌드 및 푸시
      # ======================================================================
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ github.run_number }}
            ${{ env.IMAGE_NAME }}:latest
          load: true
          # Why: GHA 캐시 제거
          #      self-hosted runner에서 GHA 캐시는 GitHub 서버와 왕복 → 20분 소요
          #      hugomods 이미지로 전환으로 Hugo 레이어 제거 → 캐시 없어도 빠름
          # Why: load: true
          #      runner 재연결 후 docker login 컨텍스트 초기화 시 docker pull이 unauthorized 실패
          #      로컬 daemon에 저장해두면 Verify Build step에서 pull 불필요

      # ======================================================================
      # Step 4.5: 빌드 검증
      # ======================================================================
      - name: Verify Build
        run: |
          echo "🔍 Verifying Docker image..."

          # Why: load: true로 이미지가 이미 로컬 daemon에 있으므로 pull 불필요
          #      docker pull은 runner 재연결 후 auth context 초기화 시 unauthorized 실패
          docker image inspect ${{ env.IMAGE_NAME }}:v${{ github.run_number }} > /dev/null

          # 2. 이미지 크기 확인
          IMAGE_SIZE=$(docker image inspect ${{ env.IMAGE_NAME }}:v${{ github.run_number }} \
            --format='{{.Size}}' | awk '{print int($1/1024/1024)}')
          echo "📦 Image size: ${IMAGE_SIZE} MB"

          # 3. 이미지 크기 검증 (10MB ~ 200MB 사이)
          if [ $IMAGE_SIZE -lt 10 ]; then
            echo "❌ Image too small: ${IMAGE_SIZE} MB (minimum: 10 MB)"
            exit 1
          fi

          if [ $IMAGE_SIZE -gt 200 ]; then
            echo "⚠️  Warning: Image is large: ${IMAGE_SIZE} MB (recommended: < 200 MB)"
          fi

          # 4. 레이어 수 확인
          LAYER_COUNT=$(docker image inspect ${{ env.IMAGE_NAME }}:v${{ github.run_number }} \
            --format='{{len .RootFS.Layers}}')
          echo "📚 Layers: ${LAYER_COUNT}"

          echo "✅ Build verification passed"

      # ======================================================================
      # Step 4.6: Trivy 이미지 보안 스캔 (DevSecOps)
      # ======================================================================
      # Why: trivy-action 대신 직접 실행
      #      trivy-action 내부의 setup-trivy가 aquasecurity/trivy 레포를 main 브랜치로
      #      clone 시도하지만 실제 기본 브랜치가 main이 아니므로 항상 실패.
      #      GitLeaks와 동일하게 바이너리를 직접 다운로드하여 이 문제를 회피.
      - name: Scan image with Trivy
        run: |
          TRIVY_VERSION="0.69.2"
          # Why: /mnt/data/ci/cache/trivy-db → 재부팅 후에도 유지되는 영구 디스크
          #      WAS trivy-nightly와 DB를 공유 → 두 워크플로가 같은 DB 갱신본 사용
          TRIVY_BIN="/mnt/data/ci/cache/trivy-db/trivy-${TRIVY_VERSION}"

          if [ ! -f "$TRIVY_BIN" ]; then
            curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
              | tar -xz -C "/mnt/data/ci/cache/trivy-db" trivy
            mv /mnt/data/ci/cache/trivy-db/trivy "$TRIVY_BIN"
          fi

          # Why: --cache-dir /mnt/data/ci/cache/trivy-db → Trivy 자체 갱신 기능 활용
          #      Trivy는 기존 DB 있으면 delta만 업데이트 → 항상 859MB 유지
          #      GHA Cache 미사용 → 10GB 한도 문제 완전 해소
          # Why: exit-code 0 → CRITICAL/HIGH 발견해도 빌드 실패 안 함 (경고만)
          $TRIVY_BIN image \
            --cache-dir /mnt/data/ci/cache/trivy-db \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format table \
            --timeout 5m \
            ${{ env.IMAGE_NAME }}:v${{ github.run_number }}

      # ======================================================================
      # Step 5: GitOps - Update Kubernetes Manifest (Stateless)
      # ======================================================================
      # Stateless 방식: 매번 임시 디렉터리로 clone하여 로컬 의존성 제거
      - name: Update Kubernetes Manifest (GitOps)
        env:
          GITHUB_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          # 1. 임시 디렉터리로 k8s-manifests clone (Stateless)
          TEMP_DIR="/tmp/k8s-manifests-${{ github.run_number }}"
          echo "📁 Cloning to: $TEMP_DIR"

          # Why: --depth 1 = 최신 커밋만 clone (전체 히스토리 불필요, ~30초 절약)
          git clone --depth 1 https://${{ secrets.GITOPS_TOKEN }}@github.com/wlals2/k8s-manifests.git $TEMP_DIR
          cd $TEMP_DIR/services/blog-system/web

          # 2. yq로 이미지 태그 업데이트
          yq eval ".spec.template.spec.containers[0].image = \"${{ env.IMAGE_NAME }}:v${{ github.run_number }}\"" \
            -i web-rollout.yaml

          # 3. Git Commit & Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web-rollout.yaml
          git commit -m "chore: Update WEB image to v${{ github.run_number }}"
          git push origin main

          echo "✅ Manifest updated: v${{ github.run_number }}"
          echo "ArgoCD will deploy automatically (within 3min)"

          # 4. Cleanup (임시 디렉터리 삭제)
          rm -rf $TEMP_DIR
          echo "🧹 Cleaned up temporary directory"

      # ======================================================================
      # Step 6: Wait for ArgoCD Sync
      # ======================================================================
      - name: Wait for ArgoCD Sync
        run: |
          echo "Waiting for ArgoCD to sync..."
          sleep 30  # ArgoCD는 3초마다 poll, 여유있게 30초 대기

          # ArgoCD Application 상태 확인
          kubectl get application blog-system -n argocd

          # Pod 상태 확인
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=web

      # ======================================================================
      # Step 7: Cloudflare 캐시 퍼지
      # ======================================================================
      - name: Purge Cloudflare Cache
        if: success()
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Cloudflare cache purged successfully"

      # ======================================================================
      # Step 8: 빌드 정보 출력
      # ======================================================================
      - name: Build Summary
        if: success()
        run: |
          echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.IMAGE_NAME }}:v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace**: ${{ env.NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment**: ${{ env.DEPLOYMENT_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://blog.jiminhome.shop/" >> $GITHUB_STEP_SUMMARY
          echo "- **Cloudflare Cache**: Purged ✅" >> $GITHUB_STEP_SUMMARY

      # ======================================================================
      # Step 9: 이메일 알림
      # ======================================================================
      - name: Send Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "WEB 배포 ${{ job.status == 'success' && '성공' || '실패' }}"
          description: |
            **이미지**: ${{ env.IMAGE_NAME }}:v${{ github.run_number }}
            **커밋**: ${{ github.event.head_commit.message }}
            **작성자**: ${{ github.event.head_commit.author.name }}
            **URL**: https://blog.jiminhome.shop/
            **워크플로우**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ job.status == 'success' && 0x00FF00 || 0xFF0000 }}
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
# Trigger: Test stateless k8s-manifests clone (WEB)
# Test Discord notification - 20260204_003442
