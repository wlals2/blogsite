name: Deploy WEB to Kubernetes

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 수동 실행 가능

env:
  IMAGE_NAME: ghcr.io/wlals2/blog-web
  NAMESPACE: blog-system
  DEPLOYMENT_NAME: web

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # ======================================================================
      # Step 1: Checkout 코드
      # ======================================================================
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false  # PaperMod은 더 이상 submodule이 아님
          # Why: 전체 Git 히스토리 스캔 (depth=1이면 과거 커밋에서 지운 Secrets 놓침)
          fetch-depth: 0

      # ======================================================================
      # Step 1.5: Secrets 스캔 (DevSecOps - GitLeaks)
      # ======================================================================
      # Why: Hugo config, Cloudflare API Token 등이 실수로 커밋될 수 있음
      #      탐지 예시: CLOUDFLARE_API_TOKEN, GHCR_TOKEN 하드코딩 후 삭제해도 히스토리에 남음
      #      exit-code 기본값 1 → Secrets 발견 시 이후 Steps 전체 차단 (Build/Deploy 불가)
      - name: Scan for secrets with GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_SUMMARY: true

      # ======================================================================
      # Step 2: Docker Buildx 설정 (캐시 활용)
      # ======================================================================
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ======================================================================
      # Step 3: GHCR 로그인
      # ======================================================================
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # ======================================================================
      # Step 4: Docker 이미지 빌드 및 푸시
      # ======================================================================
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            GIT_COMMIT=${{ github.sha }}
          tags: |
            ${{ env.IMAGE_NAME }}:v${{ github.run_number }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ======================================================================
      # Step 4.5: 빌드 검증
      # ======================================================================
      - name: Verify Build
        run: |
          echo "🔍 Verifying Docker image..."

          # 1. 이미지 존재 확인
          docker pull ${{ env.IMAGE_NAME }}:v${{ github.run_number }}

          # 2. 이미지 크기 확인
          IMAGE_SIZE=$(docker image inspect ${{ env.IMAGE_NAME }}:v${{ github.run_number }} \
            --format='{{.Size}}' | awk '{print int($1/1024/1024)}')
          echo "📦 Image size: ${IMAGE_SIZE} MB"

          # 3. 이미지 크기 검증 (10MB ~ 200MB 사이)
          if [ $IMAGE_SIZE -lt 10 ]; then
            echo "❌ Image too small: ${IMAGE_SIZE} MB (minimum: 10 MB)"
            exit 1
          fi

          if [ $IMAGE_SIZE -gt 200 ]; then
            echo "⚠️  Warning: Image is large: ${IMAGE_SIZE} MB (recommended: < 200 MB)"
          fi

          # 4. 레이어 수 확인
          LAYER_COUNT=$(docker image inspect ${{ env.IMAGE_NAME }}:v${{ github.run_number }} \
            --format='{{len .RootFS.Layers}}')
          echo "📚 Layers: ${LAYER_COUNT}"

          echo "✅ Build verification passed"

      # ======================================================================
      # Step 4.6: Trivy 이미지 보안 스캔 (DevSecOps)
      # ======================================================================
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:v${{ github.run_number }}
          format: 'table'
          exit-code: '0'  # 취약점 발견해도 빌드 실패 안 함 (경고만)
          severity: 'CRITICAL,HIGH'
          timeout: '5m'

      # ======================================================================
      # Step 5: GitOps - Update Kubernetes Manifest (Stateless)
      # ======================================================================
      # Stateless 방식: 매번 임시 디렉터리로 clone하여 로컬 의존성 제거
      - name: Update Kubernetes Manifest (GitOps)
        env:
          GITHUB_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          # 1. 임시 디렉터리로 k8s-manifests clone (Stateless)
          TEMP_DIR="/tmp/k8s-manifests-${{ github.run_number }}"
          echo "📁 Cloning to: $TEMP_DIR"

          git clone https://${{ secrets.GITOPS_TOKEN }}@github.com/wlals2/k8s-manifests.git $TEMP_DIR
          cd $TEMP_DIR/services/blog-system/web

          # 2. yq로 이미지 태그 업데이트
          yq eval ".spec.template.spec.containers[0].image = \"${{ env.IMAGE_NAME }}:v${{ github.run_number }}\"" \
            -i web-rollout.yaml

          # 3. Git Commit & Push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web-rollout.yaml
          git commit -m "chore: Update WEB image to v${{ github.run_number }}"
          git push origin main

          echo "✅ Manifest updated: v${{ github.run_number }}"
          echo "ArgoCD will deploy automatically (within 3min)"

          # 4. Cleanup (임시 디렉터리 삭제)
          rm -rf $TEMP_DIR
          echo "🧹 Cleaned up temporary directory"

      # ======================================================================
      # Step 6: Wait for ArgoCD Sync
      # ======================================================================
      - name: Wait for ArgoCD Sync
        run: |
          echo "Waiting for ArgoCD to sync..."
          sleep 30  # ArgoCD는 3초마다 poll, 여유있게 30초 대기

          # ArgoCD Application 상태 확인
          kubectl get application blog-system -n argocd

          # Pod 상태 확인
          kubectl get pods -n ${{ env.NAMESPACE }} -l app=web

      # ======================================================================
      # Step 7: Cloudflare 캐시 퍼지
      # ======================================================================
      - name: Purge Cloudflare Cache
        if: success()
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'
          echo "Cloudflare cache purged successfully"

      # ======================================================================
      # Step 8: 빌드 정보 출력
      # ======================================================================
      - name: Build Summary
        if: success()
        run: |
          echo "### ✅ Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.IMAGE_NAME }}:v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace**: ${{ env.NAMESPACE }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment**: ${{ env.DEPLOYMENT_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://blog.jiminhome.shop/" >> $GITHUB_STEP_SUMMARY
          echo "- **Cloudflare Cache**: Purged ✅" >> $GITHUB_STEP_SUMMARY

      # ======================================================================
      # Step 9: 이메일 알림
      # ======================================================================
      - name: Send Discord Notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ job.status }}
          title: "WEB 배포 ${{ job.status == 'success' && '성공' || '실패' }}"
          description: |
            **이미지**: ${{ env.IMAGE_NAME }}:v${{ github.run_number }}
            **커밋**: ${{ github.event.head_commit.message }}
            **작성자**: ${{ github.event.head_commit.author.name }}
            **URL**: https://blog.jiminhome.shop/
            **워크플로우**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ job.status == 'success' && 0x00FF00 || 0xFF0000 }}
          username: GitHub Actions
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png
# Trigger: Test stateless k8s-manifests clone (WEB)
# Test Discord notification - 20260204_003442
