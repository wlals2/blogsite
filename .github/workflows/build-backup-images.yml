name: Build Backup Images

# Why: 백업 이미지는 Dockerfile 변경 시에만 빌드 (일반 코드 변경과 무관)
on:
  push:
    branches: [ main ]
    paths:
      - 'docker/mysql-backup/**'
      - 'docker/etcd-backup/**'
      - '.github/workflows/build-backup-images.yml'
  workflow_dispatch:  # Why: Dockerfile 미변경이라도 베이스 이미지 보안 패치 시 수동 리빌드

env:
  REGISTRY: ghcr.io
  MYSQL_IMAGE: ghcr.io/wlals2/mysql-backup
  ETCD_IMAGE: ghcr.io/wlals2/etcd-backup

jobs:
  # ======================================================================
  # 변경된 이미지만 빌드 (paths-filter)
  # ======================================================================
  detect-changes:
    runs-on: self-hosted
    outputs:
      mysql: ${{ steps.filter.outputs.mysql }}
      etcd: ${{ steps.filter.outputs.etcd }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mysql:
              - 'docker/mysql-backup/**'
            etcd:
              - 'docker/etcd-backup/**'

  # ======================================================================
  # MySQL Backup Image
  # ======================================================================
  build-mysql-backup:
    needs: detect-changes
    # Why: Dockerfile 변경 시 또는 수동 트리거 시에만 빌드
    if: needs.detect-changes.outputs.mysql == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Why: self-hosted runner에서 gitleaks-action v2는 SARIF rootDirectory 에러 발생
      - name: Scan for secrets with GitLeaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_BIN="/tmp/gitleaks-${GITLEAKS_VERSION}/gitleaks"

          if [ ! -f "$GITLEAKS_BIN" ]; then
            mkdir -p "/tmp/gitleaks-${GITLEAKS_VERSION}"
            curl -sSfL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C "/tmp/gitleaks-${GITLEAKS_VERSION}"
          fi

          $GITLEAKS_BIN detect --source=. -v --exit-code=2 --log-opts="HEAD~1..HEAD"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push mysql-backup image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/mysql-backup
          push: true
          tags: |
            ${{ env.MYSQL_IMAGE }}:v${{ github.run_number }}
            ${{ env.MYSQL_IMAGE }}:latest
          load: true

      # Why: trivy-action 내부 setup-trivy가 main 브랜치 clone 실패
      - name: Scan image with Trivy
        run: |
          TRIVY_VERSION="0.69.2"
          TRIVY_BIN="/mnt/data/ci/cache/trivy-db/trivy-${TRIVY_VERSION}"

          if [ ! -f "$TRIVY_BIN" ]; then
            curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
              | tar -xz -C "/mnt/data/ci/cache/trivy-db" trivy
            mv /mnt/data/ci/cache/trivy-db/trivy "$TRIVY_BIN"
          fi

          $TRIVY_BIN image \
            --cache-dir /mnt/data/ci/cache/trivy-db \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format table \
            --timeout 5m \
            ${{ env.MYSQL_IMAGE }}:v${{ github.run_number }}

      - name: Build Summary
        if: success()
        run: |
          echo "### mysql-backup image built" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.MYSQL_IMAGE }}:v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next**: Update backup-cronjobs.yaml image tag" >> $GITHUB_STEP_SUMMARY

  # ======================================================================
  # etcd Backup Image
  # ======================================================================
  build-etcd-backup:
    needs: detect-changes
    if: needs.detect-changes.outputs.etcd == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Scan for secrets with GitLeaks
        run: |
          GITLEAKS_VERSION="8.24.3"
          GITLEAKS_BIN="/tmp/gitleaks-${GITLEAKS_VERSION}/gitleaks"

          if [ ! -f "$GITLEAKS_BIN" ]; then
            mkdir -p "/tmp/gitleaks-${GITLEAKS_VERSION}"
            curl -sSfL "https://github.com/zricethezav/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
              | tar -xz -C "/tmp/gitleaks-${GITLEAKS_VERSION}"
          fi

          $GITLEAKS_BIN detect --source=. -v --exit-code=2 --log-opts="HEAD~1..HEAD"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push etcd-backup image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/etcd-backup
          push: true
          tags: |
            ${{ env.ETCD_IMAGE }}:v${{ github.run_number }}
            ${{ env.ETCD_IMAGE }}:latest
          load: true

      - name: Scan image with Trivy
        run: |
          TRIVY_VERSION="0.69.2"
          TRIVY_BIN="/mnt/data/ci/cache/trivy-db/trivy-${TRIVY_VERSION}"

          if [ ! -f "$TRIVY_BIN" ]; then
            curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
              | tar -xz -C "/mnt/data/ci/cache/trivy-db" trivy
            mv /mnt/data/ci/cache/trivy-db/trivy "$TRIVY_BIN"
          fi

          $TRIVY_BIN image \
            --cache-dir /mnt/data/ci/cache/trivy-db \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format table \
            --timeout 5m \
            ${{ env.ETCD_IMAGE }}:v${{ github.run_number }}

      - name: Build Summary
        if: success()
        run: |
          echo "### etcd-backup image built" >> $GITHUB_STEP_SUMMARY
          echo "- **Image**: ${{ env.ETCD_IMAGE }}:v${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Next**: Update backup-cronjobs.yaml image tag" >> $GITHUB_STEP_SUMMARY

  # ======================================================================
  # Discord 알림
  # ======================================================================
  notify:
    needs: [build-mysql-backup, build-etcd-backup]
    if: always()
    runs-on: self-hosted
    steps:
      - name: Send Discord Notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ (needs.build-mysql-backup.result == 'success' || needs.build-mysql-backup.result == 'skipped') && (needs.build-etcd-backup.result == 'success' || needs.build-etcd-backup.result == 'skipped') && 'success' || 'failure' }}
          title: "Backup Images Build"
          description: |
            **mysql-backup**: ${{ needs.build-mysql-backup.result }}
            **etcd-backup**: ${{ needs.build-etcd-backup.result }}
          username: GitHub Actions
