name: Trivy Security Scan

# ==============================================================================
# Why: deploy-was.yml / deploy-web.yml에서 분리 (09-cicd-workflow 원칙 1~3)
#   - 가시성: "Deploy" 실패와 "Scan" 결과가 Actions 목록에서 혼동되지 않도록
#   - 장애 격리: 스캔 템플릿 수정이 배포 파이프라인을 깨뜨리지 않도록
#   - 최소 권한: 스캔에 필요한 권한(issues:write)만 부여
# ==============================================================================
on:
  workflow_dispatch:
  schedule:
    - cron: '0 17 * * *'  # 매일 새벽 02:00 KST (UTC 17:00 = KST 02:00)

permissions:
  contents: read
  issues: write

jobs:
  scan:
    runs-on: self-hosted
    # Why: matrix로 WAS + WEB 스캔 → 코드 중복 없이 두 이미지 처리 (원칙 4: 재사용성)
    #      max-parallel 1: self-hosted runner 1대 + Trivy DB 공유 → 동시 접근 충돌 방지
    strategy:
      max-parallel: 1
      matrix:
        include:
          - image: ghcr.io/wlals2/board-was
            name: WAS
            tag: latest
          - image: ghcr.io/wlals2/blog-web
            name: WEB
            tag: latest
    steps:
      # Why: trivy-action 대신 직접 실행 (setup-trivy가 aquasecurity/trivy main 브랜치 clone 실패 문제)
      - name: Scan ${{ matrix.name }} image with Trivy
        id: trivy
        run: |
          TRIVY_VERSION="0.69.2"
          # Why: /mnt/data/ci/cache/ → 재부팅 후에도 유지되는 영구 디스크
          TRIVY_BIN="/mnt/data/ci/cache/trivy-db/trivy-${TRIVY_VERSION}"

          if [ ! -f "$TRIVY_BIN" ]; then
            curl -sSfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
              | tar -xz -C "/mnt/data/ci/cache/trivy-db" trivy
            mv /mnt/data/ci/cache/trivy-db/trivy "$TRIVY_BIN"
          fi

          # Why: 이전 버전 바이너리 삭제 (구버전 누적 방지)
          find /mnt/data/ci/cache/trivy-db -mindepth 1 -maxdepth 1 -name 'trivy-*' ! -name "trivy-${TRIVY_VERSION}" -delete

          # Why: fanal/ = 이미지 레이어 분석 캐시 → 이미지 교체 시 유령 데이터
          rm -rf /mnt/data/ci/cache/trivy-db/fanal/

          # Why: JSON → jq로 취약점 수 파싱, table → 로그에서 사람이 읽기 위한 출력
          RESULT_FILE="/tmp/trivy-result-${{ matrix.name }}.json"

          $TRIVY_BIN image \
            --cache-dir /mnt/data/ci/cache/trivy-db \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format json \
            --output "$RESULT_FILE" \
            --timeout 10m \
            ${{ matrix.image }}:${{ matrix.tag }}

          $TRIVY_BIN image \
            --cache-dir /mnt/data/ci/cache/trivy-db \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --format table \
            --timeout 10m \
            ${{ matrix.image }}:${{ matrix.tag }}

          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' "$RESULT_FILE")
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' "$RESULT_FILE")
          TOTAL=$((CRITICAL + HIGH))

          # Why: Discord에서 Actions 로그를 열지 않고도 어떤 CVE인지 바로 확인하기 위해
          VULN_SUMMARY=$(jq -r '
            [.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
            | sort_by(if .Severity=="CRITICAL" then 0 else 1 end)
            | .[]
            | "• \(.Severity) | \(.PkgName) \(.InstalledVersion) → \(.FixedVersion) | \(.VulnerabilityID)"
          ' "$RESULT_FILE")

          echo "vuln_total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "vuln_critical=$CRITICAL" >> "$GITHUB_OUTPUT"
          echo "vuln_high=$HIGH" >> "$GITHUB_OUTPUT"
          # Why: multiline output → delimiter 방식 (EOF 구분자로 줄바꿈 보존)
          {
            echo "vuln_summary<<TRIVY_EOF"
            echo "$VULN_SUMMARY"
            echo "TRIVY_EOF"
          } >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Send ${{ matrix.name }} Scan Result to Discord
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL }}
          status: ${{ steps.trivy.outcome == 'failure' && 'failure' || 'success' }}
          title: "${{ steps.trivy.outcome == 'failure' && format('❌ 야간 보안 스캔 실패 ({0})', matrix.name) || steps.trivy.outputs.vuln_total != '0' && format('⚠️ 야간 보안 스캔 완료 ({0})', matrix.name) || format('🔒 야간 보안 스캔 완료 ({0})', matrix.name) }}"
          description: |
            **스캔 대상**: ${{ matrix.image }}:${{ matrix.tag }}
            **스캔 범위**: CRITICAL, HIGH CVE (OS 패키지 + 라이브러리)
            **결과**: ${{ steps.trivy.outcome == 'failure' && '❌ 스캔 실행 실패 - 워크플로우 확인 필요' || steps.trivy.outputs.vuln_total == '0' && '✅ 취약점 없음' || format('⚠️ {0}개 취약점 발견 (Critical: {1}, High: {2})', steps.trivy.outputs.vuln_total, steps.trivy.outputs.vuln_critical, steps.trivy.outputs.vuln_high) }}
            ${{ steps.trivy.outputs.vuln_total != '0' && steps.trivy.outputs.vuln_summary || '' }}
            **워크플로우**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          color: ${{ steps.trivy.outcome == 'failure' && 0xFF0000 || steps.trivy.outputs.vuln_total != '0' && 0xFF6600 || 0x00FF00 }}
          username: Trivy Scanner
          avatar_url: https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png

      # Why: 취약점 발견 시 GitHub Issue로 이력 관리 + 조치 추적
      - name: Create GitHub Issue for ${{ matrix.name }} vulnerabilities
        if: steps.trivy.outcome == 'success' && steps.trivy.outputs.vuln_total != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          RESULT_FILE="/tmp/trivy-result-${{ matrix.name }}.json"

          # Why: 같은 날 + 같은 이미지의 중복 Issue 방지
          EXISTING=$(gh issue list --search "Trivy 야간 스캔: ${{ matrix.name }} ${TODAY}" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "이미 오늘자 Issue #${EXISTING} 존재 → 스킵"
            exit 0
          fi

          # Why: OS 패키지와 라이브러리는 조치 방법이 다르므로 분리
          OS_VULNS=$(jq -r '
            [.Results[]? | select(.Type != "jar") | .Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
            | sort_by(if .Severity=="CRITICAL" then 0 else 1 end)
            | .[]
            | "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion) | \(.VulnerabilityID) |"
          ' "$RESULT_FILE")

          JAR_VULNS=$(jq -r '
            [.Results[]? | select(.Type == "jar") | .Vulnerabilities[]? | select(.Severity=="CRITICAL" or .Severity=="HIGH")]
            | sort_by(if .Severity=="CRITICAL" then 0 else 1 end)
            | .[]
            | "| \(.Severity) | \(.PkgName) | \(.InstalledVersion) | \(.FixedVersion) | \(.VulnerabilityID) |"
          ' "$RESULT_FILE")

          # Why: security label이 없으면 gh issue create --label 실패
          gh api repos/${{ github.repository }}/labels \
            -f name="security" -f color="e11d48" -f description="보안 취약점 관련" \
            2>/dev/null || true

          cat > /tmp/trivy-issue.md <<EOF
          ## 스캔 결과

          - **이미지**: \`${{ matrix.image }}:${{ matrix.tag }}\`
          - **발견일**: ${TODAY}
          - **총 취약점**: ${{ steps.trivy.outputs.vuln_total }}개 (Critical: ${{ steps.trivy.outputs.vuln_critical }}, High: ${{ steps.trivy.outputs.vuln_high }})
          - **워크플로우**: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## OS 패키지 취약점

          | Severity | Package | Installed | Fixed | CVE |
          |----------|---------|-----------|-------|-----|
          ${OS_VULNS:-| - | 없음 | - | - | - |}

          **조치 방법**: Dockerfile 베이스 이미지 업데이트 또는 \`apk upgrade --no-cache\`

          ## 라이브러리 취약점

          | Severity | Package | Installed | Fixed | CVE |
          |----------|---------|-----------|-------|-----|
          ${JAR_VULNS:-| - | 없음 | - | - | - |}

          **조치 방법**: 의존성 버전 업그레이드 (Fixed Version 컬럼 참조)

          ## 조치 체크리스트

          - [ ] OS 패키지 취약점 조치
          - [ ] 라이브러리 취약점 조치
          - [ ] \`git push\` → CI 빌드 → Trivy 재스캔으로 해소 확인
          - [ ] 확인 완료 후 이 Issue 닫기
          EOF

          sed -i 's/^          //' /tmp/trivy-issue.md

          gh issue create \
            --title "🔒 Trivy 야간 스캔: ${{ matrix.name }} ${{ steps.trivy.outputs.vuln_total }}개 취약점 발견 (${TODAY})" \
            --label "security" \
            --body-file /tmp/trivy-issue.md
