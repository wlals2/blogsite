# ==============================================================================
# GitLeaks Allowlist — 블로그 글/문서 내 예시 코드 오탐 제외
# ==============================================================================
# 목적: 블로그 글의 예시 패스워드/Base64 값이 generic-api-key 룰에 걸리는 오탐 방지
# 의존성: .github/workflows/deploy-web.yml, build-backup-images.yml의 GitLeaks step
# ==============================================================================

# Why: gitleaks는 프로젝트 루트의 .gitleaks.toml을 자동 인식 (--config 불필요)

[allowlist]
  # Why: 블로그 content/study 글은 학습용 예시 코드만 포함 — 실제 운영 secret 없음
  # Why: .claude/ 디렉터리는 Agent 구현 계획서 — 예시 YAML 스니펫 포함
  paths = [
    '''content/study/.*\.md$''',
    '''\.claude/.*\.md$''',
  ]
