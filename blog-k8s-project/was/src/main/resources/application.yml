# ==============================================================================
# Spring Boot Application 설정
# ==============================================================================

# 서버 포트 설정 (error 설정은 Actuator 섹션 아래에 통합)

# Spring 설정
spring:
  application:
    name: board  # 애플리케이션 이름

  # 데이터베이스 연결 설정
  datasource:
    # 환경변수로 주입 (Kubernetes ConfigMap/Secret)
    # 기본값: 로컬 MySQL (개발용)
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/board?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:rootpassword}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA (Java Persistence API) 설정
  jpa:
    # Hibernate 설정
    hibernate:
      # Why: update는 의도치 않은 스키마 변경 위험 (운영 환경에서 none 사용)
      # 스키마 변경 시 직접 MySQL에서 DDL 실행
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

# Logging 설정
logging:
  level:
    root: INFO
    com.jimin.board: DEBUG

# Actuator 설정 (헬스체크)
management:
  endpoints:
    web:
      exposure:
        include: health,info  # /actuator/health, /actuator/info 노출
  endpoint:
    health:
      # Why: always → when-authorized로 변경.
      #      'always'는 인증 없이 DB 연결 상태, 디스크 용량, 메모리 등 내부 정보 노출.
      #      K8s Probe는 단순 UP/DOWN만 확인하면 충분 (상세 정보 불필요).
      show-details: when-authorized

# Spring Boot 기본 에러 응답 설정
server:
  port: 8080
  error:
    # Why: 기본 /error 페이지가 스택 트레이스를 포함할 수 있음.
    #      include-message: never → ex.getMessage() 응답 차단 (ZAP CWE-550 대응)
    #      include-stacktrace: never → 스택 트레이스 응답 차단
    include-message: never
    include-stacktrace: never
    include-exception: false  # 예외 클래스명 노출 차단

# GitHub OAuth 설정
github:
  oauth:
    client-id: ${GITHUB_OAUTH_CLIENT_ID:Ov23liUDXOW2o62lb8a3}
    client-secret: ${GITHUB_OAUTH_CLIENT_SECRET}  # Kubernetes Secret에서 주입
    redirect-uri: ${GITHUB_OAUTH_REDIRECT_URI:https://blog.jiminhome.shop/auth/callback}
# Trigger: Build v23 with /auth endpoint
